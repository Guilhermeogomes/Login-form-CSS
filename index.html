<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Camp.in</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;700&family=Poppins:wght@400;500;600&family=Roboto:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <img id="logo" src="/images/logo.svg" alt="" />

    <form action="">
      <header id="header">
        <h1>
          <img class="login" src="/images/log-in.svg" />
          Faça seu login
        </h1>
        <p>Entre com suas informações de cadastro.</p>
      </header>

      <div class="email-area">
        <label class="label-email " for="email">E-mail</label>
        <input class="email" type="email" placeholder="Digite seu e-mail" />
      </div>

   <div class="senha-area">
      <label class="label-senha" for="senha">Senha</label>
      <img class="eye" src="/images/eye.svg" alt="">
      <input class="input-password" type="password" placeholder="Digite sua senha"/>
    </div>

    
    <label class="container-label">Lembre-me
      <input class="check-box" type="checkbox">
      <span class="checkmark"></span>
      <a href="/pages/lostpassword.html" target="_blank">Esqueci minha senha</a>
    </label>

    <button>
      <h3>ENTRAR</h3>
    </button>
    <label class="assign" for="registre-se">Não tem uma conta?<strong> Registre-se</strong></label>
    </form>
  
    <img class="right-side-img" src="/images/side-image.jpg" alt="">
 
  </body>
</html>
